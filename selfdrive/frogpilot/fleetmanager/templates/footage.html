{% extends "layout.html" %}

{% block title %}
    Dashcam Routes
{% endblock %}

{% block main %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="display-5 fw-bold text-light">Dashcam Recordings</h1>
        <i class="fas fa-video fa-2x text-primary"></i>
    </div>

    <div class="row g-4">
        {% for row, gif in zipped %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 border-0 shadow-lg hover-effect">
                <div class="image-container" style="height: 200px; overflow: hidden;">
                    <img src="/previewgif/{{ gif }}" 
                         class="card-img-top img-fluid h-100 object-fit-cover" 
                         alt="Recording preview"
                         style="filter: brightness(0.9);">
                    <div class="card-img-overlay d-flex flex-column justify-content-end">
                        <span class="badge bg-dark bg-opacity-75 mb-2">
                            <i class="fas fa-clock me-2"></i>{{ row|truncate(15, true) }}
                        </span>
                    </div>
                </div>
                
                <div class="card-body bg-dark-gradient">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="card-title text-truncate mb-0">{{ row }}</h5>
                        <a href="/footage/{{ row }}" 
                           class="btn btn-primary btn-sm rounded-pill px-3">
                            <i class="fas fa-play me-2"></i>View
                        </a>
                    </div>
                    <hr class="text-white-50 my-2">
                    <div class="d-flex justify-content-between text-muted small">
                        <span>
                            <i class="fas fa-file-video me-1"></i>MP4
                        </span>
                        <span>
                            <i class="fas fa-hd me-1"></i>1080p
                        </span>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .hover-effect {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        background: linear-gradient(145deg, #1a1e21, #23282b);
        border-radius: 12px!important;
    }
    
    .hover-effect:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .bg-dark-gradient {
        background: linear-gradient(to bottom, #2a2e32, #1f2327);
        border-bottom-left-radius: 12px!important;
        border-bottom-right-radius: 12px!important;
    }

    .object-fit-cover {
        object-fit: cover;
        object-position: center;
    }

    .text-light {
        text-shadow: 0 2px 4px rgba(0,0,0,0.3);
    }
</style>
{% endblock %}
