{% extends "layout.html" %}

{% block title %}
    Dashcam Routes
{% endblock %}

{% block main %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h1 class="display-5 fw-bold text-white text-shadow-bold">Dashcam Recordings</h1>
        <i class="fas fa-video fa-2x text-primary"></i>
    </div>

    <div class="row g-4">
        {% for row, gif in zipped %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card h-100 border-0 shadow-lg hover-effect">
                <div class="image-container" style="height: 200px; overflow: hidden;">
                    <img src="/previewgif/{{ gif }}" 
                         class="card-img-top img-fluid h-100 object-fit-cover" 
                         alt="Recording preview"
                         style="filter: brightness(0.9);">
                    <div class="card-img-overlay d-flex flex-column justify-content-end">
                        <span class="badge bg-dark bg-opacity-75">
                            {{ row|truncate(20, true) }}
                        </span>
                    </div>
                </div>
                
                <div class="card-body bg-dark-gradient">
                    <div class="d-grid">
                        <a href="/footage/{{ row }}" 
                           class="btn btn-primary btn-sm rounded-pill px-4 py-2">
                            <i class="fas fa-play me-2"></i>View Footage
                        </a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<style>
    .hover-effect {
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        background: linear-gradient(145deg, #1a1e21, #23282b);
        border-radius: 12px!important;
    }
    
    .hover-effect:hover {
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .bg-dark-gradient {
        background: linear-gradient(to bottom, #2a2e32, #1f2327);
    }

    .text-shadow-bold {
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    .btn-primary {
        transition: all 0.2s ease;
        border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-primary:hover {
        transform: scale(1.03);
        box-shadow: 0 2px 8px rgba(0,123,255,0.4);
    }
</style>
{% endblock %}
